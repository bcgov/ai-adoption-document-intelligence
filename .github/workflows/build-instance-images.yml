name: Build Instance Images

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build images from (defaults to the branch the workflow is triggered on)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  metadata:
    name: Prepare Build Metadata
    runs-on: ubuntu-latest
    outputs:
      sanitized-branch: ${{ steps.branch-info.outputs.sanitized }}
      commit-sha: ${{ steps.branch-info.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Compute branch name and SHA
        id: branch-info
        run: |
          # Resolve the branch name from inputs or the current ref
          RAW_BRANCH="${{ inputs.branch || github.ref_name }}"

          # Sanitize for container image tags: lowercase, replace non-alphanumeric
          # sequences with a single hyphen, trim leading/trailing hyphens,
          # and truncate to 128 characters (OCI tag length limit)
          SANITIZED=$(echo "$RAW_BRANCH" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9._-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//;s/-$//' \
            | cut -c1-128)

          SHA=$(git rev-parse HEAD)

          echo "sanitized=$SANITIZED" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Branch: $RAW_BRANCH -> Tag: $SANITIZED"
          echo "Commit SHA: $SHA"

  get-environment:
    name: Get Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Get Environment
        id: env
        uses: ./.github/actions/get-environment

  build:
    name: Build ${{ matrix.service }}
    needs: [metadata, get-environment]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.get-environment.outputs.environment }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend-services
            context: "."
            dockerfile: apps/backend-services/Dockerfile
          - service: frontend
            context: apps/frontend
            dockerfile: apps/frontend/Dockerfile
          - service: temporal
            context: "."
            dockerfile: apps/temporal/Dockerfile
    env:
      ARTIFACTORY_URL: ${{ secrets.ARTIFACTORY_URL }}
      ARTIFACTORY_SA_USERNAME: ${{ secrets.ARTIFACTORY_SA_USERNAME }}
      ARTIFACTORY_SA_PASSWORD: ${{ secrets.ARTIFACTORY_SA_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifactory
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ARTIFACTORY_URL }}
          username: ${{ env.ARTIFACTORY_SA_USERNAME }}
          password: ${{ env.ARTIFACTORY_SA_PASSWORD }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-instance-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-instance-${{ matrix.service }}-

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.ARTIFACTORY_URL }}/kfd3-fd34fb-local/${{ matrix.service }}:${{ needs.metadata.outputs.sanitized-branch }}
            ${{ env.ARTIFACTORY_URL }}/kfd3-fd34fb-local/${{ matrix.service }}:${{ needs.metadata.outputs.commit-sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.metadata.outputs.commit-sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
