# Main nginx config for non-root / OpenShift: use /tmp for all writable paths
worker_processes auto;
# Omit 'user' so container runs as arbitrary non-root UID (OpenShift)
error_log /tmp/nginx/error.log warn;
pid /tmp/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /tmp/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    gzip on;

    # Writable paths under /tmp (safe for non-root and read-only filesystem)
    client_body_temp_path /tmp/nginx/client_temp;
    proxy_temp_path /tmp/nginx/proxy_temp;
    fastcgi_temp_path /tmp/nginx/fastcgi_temp;
    uwsgi_temp_path /tmp/nginx/uwsgi_temp;
    scgi_temp_path /tmp/nginx/scgi_temp;

    include /etc/nginx/conf.d/*.conf;
}
