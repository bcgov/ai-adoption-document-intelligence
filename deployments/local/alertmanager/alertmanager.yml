# Local Alertmanager configuration.
# By default all alerts are routed to the 'drop' receiver (no notifications).
#
# To test CHES email delivery locally:
#   1. Copy CHES_ADAPTER_SECRET from deployments/local/.env and paste it into
#      the `credentials:` field in the ches-notifications receiver below.
#   2. Restart alertmanager:
#        podman compose -f deployments/local/docker-compose.monitoring.yml restart alertmanager
#   3. POST a test alert to fire immediately (no need to wait for Prometheus):
#        curl -s -X POST http://localhost:9093/api/v2/alerts \
#          -H "Content-Type: application/json" \
#          -d '[{"labels":{"alertname":"TestAlert","severity":"warning"},"annotations":{"summary":"Local test alert","description":"Fired manually to verify CHES delivery."}}]'
#   4. Check ches-adapter logs: podman logs ai-doc-intelligence-ches-adapter -f
#
# NOTE: Do NOT commit this file with a real secret in `credentials:` — it is tracked by git.
#       Remove the secret before committing.

global:
  resolve_timeout: 5m

# Suppress generic catch-all alerts when a specific named alert is already
# firing for the same alertType. The specific rules carry a `type` label;
# AnyBackendServicesError and AnyTemporalWorkerError carry the same label
# from the metric. BackendServicesAlertActive / TemporalWorkerAlertActive
# carry `type` from app_alert_active labels.
inhibit_rules:
  - source_matchers:
      - 'type != ""'
    target_matchers:
      - 'alertname =~ "AnyBackendServicesError|AnyTemporalWorkerError|BackendServicesAlertActive|TemporalWorkerAlertActive"'
    equal: ['type']

route:
  receiver: "drop" # Fallback
  group_by: ["alertname", "job"]
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h
  routes:
    # BackendServicesAlertActive and TemporalWorkerAlertActive are sticky gauges
    # — they stay active until a recovery log is emitted. Repeat at most once
    # per day to avoid hourly spam.
    - receiver: "ches-notifications"
      matchers:
        - 'alertname =~ "BackendServicesAlertActive|TemporalWorkerAlertActive"'
        - 'severity =~ "warning|critical"'
      repeat_interval: 24h
    - receiver: "ches-notifications"
      matchers:
        - 'severity =~ "warning|critical"'

receivers:
  - name: "drop"
  # Uncomment and fill in to enable CHES notifications locally.
  # The ches-adapter runs in the same docker network as alertmanager, so use
  # the container name + port 3003 (NOT the backend at port 3002).
  - name: "ches-notifications"
    webhook_configs:
      - url: "http://ai-doc-intelligence-ches-adapter:3003/"
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials: "<CHES_ADAPTER_SECRET value>"
