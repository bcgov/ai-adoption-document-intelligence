services:
  loki:
    image: grafana/loki:3.4.0
    container_name: ai-doc-intelligence-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  promtail:
    image: grafana/promtail:3.4.0
    container_name: ai-doc-intelligence-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - ../../logs:/var/log/host-apps:ro
    depends_on:
      loki:
        condition: service_healthy

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: ai-doc-intelligence-alertmanager
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "printf '%s' \"$$CHES_ADAPTER_SECRET\" > /tmp/alertmanager-token && exec /bin/alertmanager --config.file=/etc/alertmanager/alertmanager.yml --storage.path=/alertmanager"
    environment:
      CHES_ADAPTER_SECRET: ${CHES_ADAPTER_SECRET}
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  ches-adapter:
    build:
      context: ../..
      dockerfile: apps/ches-adapter/Dockerfile
    container_name: ai-doc-intelligence-ches-adapter
    restart: unless-stopped
    environment:
      PORT: 3003
      CHES_ADAPTER_SECRET: ${CHES_ADAPTER_SECRET}
      CHES_CLIENT_ID: ${CHES_CLIENT_ID}
      CHES_CLIENT_SECRET: ${CHES_CLIENT_SECRET}
      CHES_AUTH_HOST: ${CHES_AUTH_HOST}
      CHES_HOST: ${CHES_HOST}
      CHES_FROM_EMAIL: ${CHES_FROM_EMAIL}
      CHES_TO_EMAILS: ${CHES_TO_EMAILS}
    ports:
      - "3003:3003"

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: ai-doc-intelligence-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      alertmanager:
        condition: service_healthy
    extra_hosts:
      - "host.containers.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  grafana:
    image: grafana/grafana:11.5.2
    container_name: ai-doc-intelligence-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ../openshift/helm/plg/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy

volumes:
  loki_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
