global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "backend-services"
    metrics_path: "/metrics"
    scrape_interval: 15s
    static_configs:
      - targets:
          - "host.docker.internal:3002"

  - job_name: "temporal-server"
    metrics_path: "/metrics"
    scrape_interval: 15s
    static_configs:
      - targets:
          - "temporal:9090"
