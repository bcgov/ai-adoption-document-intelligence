apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-services-config
  labels:
    app: backend-services
data:
  FRONTEND_URL: "https://your-frontend-url.example.com"
  BACKEND_URL: "https://your-backend-url.example.com"
  DATABASE_API_URL: "http://database-api:3001/api/documents"
  RABBITMQ_URL: "amqp://rabbitmq:5672"
  RABBITMQ_EXCHANGE: "document_upload"
  RABBITMQ_ROUTING_KEY: "document.uploaded"
  SSO_AUTH_SERVER_URL: "https://dev.loginproxy.gov.bc.ca/auth/realms/standard/protocol/openid-connect"
  SSO_REALM: "standard"
  SSO_CLIENT_ID: "ai-adoption-document-intelligence-6162"
  AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: "https://your-azure-endpoint.cognitiveservices.azure.com"
  AZURE_DOCUMENT_INTELLIGENCE_MODEL_ID: "prebuilt-read"

