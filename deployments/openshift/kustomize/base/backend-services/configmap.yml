apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-services-config
  labels:
    app: backend-services
data:
  # OpenShift route URLs: replace fd34fb-test with your namespace (dev/test/prod)
  FRONTEND_URL: "https://frontend-fd34fb-test.apps.silver.devops.gov.bc.ca"
  BACKEND_URL: "https://backend-services-fd34fb-test.apps.silver.devops.gov.bc.ca"
  # Keycloak must redirect to this callback; must match backend route + /api/auth/callback
  SSO_REDIRECT_URI: "https://backend-services-fd34fb-test.apps.silver.devops.gov.bc.ca/api/auth/callback"
  # In-cluster service URLs (same namespace)
  DATABASE_API_URL: "http://database-api:3001/api/documents"
  RABBITMQ_URL: "amqp://rabbitmq:5672"
  RABBITMQ_EXCHANGE: "document_upload"
  RABBITMQ_ROUTING_KEY: "document.uploaded"
  # BC Gov SSO (dev login proxy)
  SSO_AUTH_SERVER_URL: "https://test.loginproxy.gov.bc.ca/auth/realms/standard/protocol/openid-connect"
  SSO_REALM: "standard"
  SSO_CLIENT_ID: "xxx"
  # Azure Document Intelligence: set endpoint per instance; API key in secret
  AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: "https://your-region.api.cognitive.microsoft.com"
  AZURE_DOCUMENT_INTELLIGENCE_MODEL_ID: "prebuilt-read"
  # Temporal in-cluster (same namespace)
  TEMPORAL_ADDRESS: "temporal:7233"
  TEMPORAL_NAMESPACE: "default"
  TEMPORAL_TASK_QUEUE: "ocr-processing"

