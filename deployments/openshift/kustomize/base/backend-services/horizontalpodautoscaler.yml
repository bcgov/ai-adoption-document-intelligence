apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-services
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-services
  # Start with 2 replicas for HA. The deployment starts at 1, and HPA will scale to 2.
  # This is safe: RollingUpdate strategy ensures pods start sequentially, and the
  # initContainer with Prisma advisory locks prevents migration races.
  minReplicas: 2
  # Max 5 replicas: with DB_POOL_MAX=20 per pod, that's 100 connections — tune
  # DB_POOL_MAX down in prod.env when running at max scale (Postgres max_connections=100).
  # Combined with temporal workers (max 4 * 3 = 12), total is 37 of Postgres default 100.
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
