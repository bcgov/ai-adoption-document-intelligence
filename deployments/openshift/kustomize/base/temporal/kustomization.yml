apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - postgrescluster.yml
  - temporal-postgres-init-sql-configmap.yml
  - temporal-server-deployment.yml
  - temporal-server-service.yml
  - temporal-ui-deployment.yml
  - temporal-ui-service.yml
  # No Route for Temporal UI — it must not be publicly exposed. The Service is
  # ClusterIP only; access via `oc port-forward svc/<instance>-temporal-ui 8080:8080`.
  - temporal-worker-configmap.yml
  - temporal-worker-secrets.yml
  - temporal-worker-deployment.yml
  - pvc-logs.yml
  - logrotate-configmap.yml
  - promtail-configmap-worker.yml
  - promtail-configmap-server.yml
commonLabels:
  app.kubernetes.io/part-of: temporal
