apiVersion: v1
kind: Secret
metadata:
  name: temporal-worker-secrets
  labels:
    app: temporal-worker
type: Opaque
stringData:
  AZURE_DOCUMENT_INTELLIGENCE_API_KEY: "your-azure-api-key-here"
  AZURE_OPENAI_API_KEY: "your-azure-openai-api-key-here"
  AZURE_STORAGE_CONNECTION_STRING: "your-azure-storage-connection-string-here"
  AZURE_STORAGE_ACCOUNT_NAME: "your-azure-storage-account-name-here"
  AZURE_STORAGE_ACCOUNT_KEY: "your-azure-storage-account-key-here"
  # Platform API key the worker's dyn.run activity injects into dynamic-node
  # scripts as AI_DI_API_KEY so they can call back into the platform API.
  # Sourced SERVER-SIDE (never threaded through Temporal workflow history) —
  # see apps/temporal/src/dynamic-nodes/dyn-run.activity.ts. Set this to a
  # service-account API key with the permissions dynamic nodes require.
  PLATFORM_API_KEY: "your-platform-api-key-here"
