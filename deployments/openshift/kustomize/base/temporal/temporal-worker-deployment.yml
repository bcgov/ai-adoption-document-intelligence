apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-worker
  labels:
    app: temporal-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-worker
  template:
    metadata:
      labels:
        app: temporal-worker
    spec:
      # Allow app user (nodeuser/nodejs 1001) to write to logs PVC
      securityContext:
        fsGroup: 1001
      containers:
        - name: temporal-worker
          image: artifacts.developer.gov.bc.ca/kfd3-fd34fb-local/temporal:develop-latest
          imagePullPolicy: Always
          command: ["sh", "-c"]
          args: ["node dist/worker.js 2>&1 | tee -a /var/log/app/worker.log"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-cluster-pguser-admin
                  key: uri
            # Crunchy Postgres on OpenShift requires SSL; uselibpqcompat allows self-signed certs
            - name: PGSSLMODE
              value: "require"
            - name: PGSSLREJECTUNAUTHORIZED
              value: "false"
            - name: TEMPORAL_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: TEMPORAL_ADDRESS
            - name: TEMPORAL_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: TEMPORAL_NAMESPACE
            - name: TEMPORAL_TASK_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: TEMPORAL_TASK_QUEUE
            - name: AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT
            - name: AZURE_DOCUMENT_INTELLIGENCE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: temporal-worker-secrets
                  key: AZURE_DOCUMENT_INTELLIGENCE_API_KEY
          volumeMounts:
            - name: storage
              mountPath: /app/data/blobs
            - name: logs
              mountPath: /var/log/app
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "kill -0 1"]
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "kill -0 1"]
            initialDelaySeconds: 10
            periodSeconds: 10
        - name: logrotate
          image: debian:bookworm-slim
          command: ["sh", "-c"]
          args:
            - |
              while true; do
                logrotate /etc/logrotate.conf
                sleep 3600
              done
          volumeMounts:
            - name: logs
              mountPath: /var/log/app
            - name: logrotate-config
              mountPath: /etc/logrotate.d
              readOnly: true
            - name: logrotate-state
              mountPath: /var/lib/logrotate
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: backend-services-storage
        - name: logs
          persistentVolumeClaim:
            claimName: temporal-worker-logs
        - name: logrotate-config
          configMap:
            name: temporal-worker-logrotate
        - name: logrotate-state
          emptyDir: {}
