apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-worker
  labels:
    app: temporal-worker
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: temporal-worker
  template:
    metadata:
      labels:
        app: temporal-worker
    spec:
      # Allow 70 seconds for graceful shutdown: complete in-flight activities (55s timeout
      # in worker code), close connections, and clean up resources before forced termination.
      terminationGracePeriodSeconds: 70
      containers:
        - name: temporal-worker
          image: artifacts.developer.gov.bc.ca/kfd3-fd34fb-local/temporal:develop-latest
          imagePullPolicy: Always
          command: ["sh", "-c"]
          args: ["node dist/worker.js 2>&1 | tee -a /var/log/app/worker.log"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-pg-pguser-admin
                  key: uri
            # Crunchy Postgres on OpenShift requires SSL; uselibpqcompat allows self-signed certs
            - name: PGSSLMODE
              value: "require"
            - name: PGSSLREJECTUNAUTHORIZED
              value: "false"
            - name: TEMPORAL_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: TEMPORAL_ADDRESS
            - name: TEMPORAL_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: TEMPORAL_NAMESPACE
            - name: TEMPORAL_TASK_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: TEMPORAL_TASK_QUEUE
            - name: AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT
            - name: AZURE_DOCUMENT_INTELLIGENCE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: temporal-worker-secrets
                  key: AZURE_DOCUMENT_INTELLIGENCE_API_KEY
            - name: BENCHMARK_TASK_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: BENCHMARK_TASK_QUEUE
            - name: ENABLE_BENCHMARK_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: ENABLE_BENCHMARK_QUEUE
            - name: BLOB_STORAGE_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: BLOB_STORAGE_PROVIDER
            - name: AZURE_STORAGE_CONTAINER_NAME
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: AZURE_STORAGE_CONTAINER_NAME
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: temporal-worker-secrets
                  key: AZURE_STORAGE_CONNECTION_STRING
            - name: AZURE_STORAGE_ACCOUNT_NAME
              valueFrom:
                secretKeyRef:
                  name: temporal-worker-secrets
                  key: AZURE_STORAGE_ACCOUNT_NAME
            - name: AZURE_STORAGE_ACCOUNT_KEY
              valueFrom:
                secretKeyRef:
                  name: temporal-worker-secrets
                  key: AZURE_STORAGE_ACCOUNT_KEY
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: AZURE_OPENAI_ENDPOINT
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: temporal-worker-secrets
                  key: AZURE_OPENAI_API_KEY
            - name: AZURE_OPENAI_DEPLOYMENT
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: AZURE_OPENAI_DEPLOYMENT
            - name: AZURE_OPENAI_API_VERSION
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: AZURE_OPENAI_API_VERSION
            - name: ENRICHMENT_REDACT_PII
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: ENRICHMENT_REDACT_PII
            # Database Connection Pool
            - name: DB_POOL_MAX
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: DB_POOL_MAX
            # Worker Concurrency Configuration
            - name: MAX_CONCURRENT_ACTIVITY_TASK_EXECUTIONS
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: MAX_CONCURRENT_ACTIVITY_TASK_EXECUTIONS
            - name: MAX_CONCURRENT_WORKFLOW_TASK_EXECUTIONS
              valueFrom:
                configMapKeyRef:
                  name: temporal-worker-config
                  key: MAX_CONCURRENT_WORKFLOW_TASK_EXECUTIONS
          volumeMounts:
            - name: storage
              mountPath: /app/data/blobs
            - name: logs
              mountPath: /var/log/app
          lifecycle:
            preStop:
              exec:
                # Sleep 5s before SIGTERM to allow metrics scrape and smooth shutdown initiation.
                # Worker code handles SIGTERM gracefully with 55s timeout for in-flight activities.
                command: ["/bin/sh", "-c", "sleep 5"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9091
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9091
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
        - name: logrotate
          image: debian:bookworm-slim
          command: ["sh", "-c"]
          args:
            - |
              while true; do
                logrotate /etc/logrotate.conf
                sleep 3600
              done
          volumeMounts:
            - name: logs
              mountPath: /var/log/app
            - name: logrotate-config
              mountPath: /etc/logrotate.d
              readOnly: true
            - name: logrotate-state
              mountPath: /var/lib/logrotate
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
        - name: promtail
          image: grafana/promtail:3.4.2
          args:
            - -config.file=/etc/promtail/promtail.yaml
          volumeMounts:
            - name: logs
              mountPath: /var/log/app
              readOnly: true
            - name: promtail-config
              mountPath: /etc/promtail
              readOnly: true
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: backend-services-storage
        - name: logs
          persistentVolumeClaim:
            claimName: temporal-worker-logs
        - name: logrotate-config
          configMap:
            name: temporal-worker-logrotate
        - name: logrotate-state
          emptyDir: {}
        - name: promtail-config
          configMap:
            name: temporal-worker-promtail
