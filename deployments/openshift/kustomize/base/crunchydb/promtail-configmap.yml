apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-promtail
  labels:
    app.kubernetes.io/part-of: crunchydb
data:
  promtail.yaml: |
    server:
      http_listen_port: 0
      grpc_listen_port: 0
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: postgresql
        static_configs:
          - targets:
              - localhost
            labels:
              service: postgresql
              __path__: /pgdata/pg16/log/*.log
