apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: frontend
  labels:
    app: frontend
  annotations:
    # 142.16.0.0/11 is the approximate VPN address range.
    haproxy.router.openshift.io/ip_whitelist: 142.16.0.0/11
spec:
  to:
    kind: Service
    name: frontend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
