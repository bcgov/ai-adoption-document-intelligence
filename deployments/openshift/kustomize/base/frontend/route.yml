apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: frontend
  labels:
    app: frontend
  annotations:
    # Only allow clients whose source IP matches one of the entries below (space-separated).
    # This is the full BC Gov public 142.x allocation (ARIN org PBC-51-Z), covering all BC Gov
    # networks including VPN egress and the Silver/Gold/Gold-DR NAT pools (all within 142.34.0.0/16).
    # Ref: https://whois.arin.net/rest/org/PBC-51-Z/nets
    # NOTE: the previous value 142.16.0.0/11 only covered 142.0.0.0–142.31.255.255 and silently
    # excluded BC Gov clients in 142.32.0.0/16–142.36.0.0/16.
    # Emerald namespaces have no fixed egress IP — add your namespace's dedicated /26 private
    # CIDR here if cross-cluster access from Emerald is needed.
    haproxy.router.openshift.io/ip_allowlist: >-
      142.22.0.0/16 142.23.0.0/16 142.24.0.0/16 142.25.0.0/16 142.26.0.0/16
      142.27.0.0/16 142.28.0.0/16 142.29.0.0/16 142.30.0.0/16 142.31.0.0/16
      142.32.0.0/16 142.33.0.0/16 142.34.0.0/16 142.35.0.0/16 142.36.0.0/16
spec:
  to:
    kind: Service
    name: frontend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
