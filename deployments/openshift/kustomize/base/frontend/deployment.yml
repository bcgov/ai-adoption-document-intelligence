apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: artifacts.developer.gov.bc.ca/kfd3-fd34fb-local/frontend:main-latest
        imagePullPolicy: Always
        command: ["sh", "-c"]
        args:
          - |
            ln -sf /var/log/app/access.log /var/log/nginx/access.log
            ln -sf /var/log/app/error.log /var/log/nginx/error.log
            exec /docker-entrypoint.sh
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        volumeMounts:
        - name: logs
          mountPath: /var/log/app
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      - name: promtail
        image: grafana/promtail:3.4.2
        args:
          - -config.file=/etc/promtail/promtail.yaml
        volumeMounts:
        - name: logs
          mountPath: /var/log/app
          readOnly: true
        - name: promtail-config
          mountPath: /etc/promtail
          readOnly: true
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      volumes:
      - name: logs
        emptyDir: {}
      - name: promtail-config
        configMap:
          name: frontend-promtail
