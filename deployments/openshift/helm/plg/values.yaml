# PLG Stack - Default Values
# Override per environment via values-local.yaml, values-openshift.yaml, or --set flags.

loki:
  image:
    repository: grafana/loki
    tag: "3.4.0"
    pullPolicy: IfNotPresent

  # Retention period in days. Loki compactor deletes chunks older than this.
  retentionDays: 30

  # PVC size for Loki data storage.
  pvcSize: 10Gi

  # Storage class for the PVC. Empty string uses the cluster default.
  storageClassName: ""

  resources:
    requests:
      memory: "256Mi"
      cpu: "500m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  # Port Loki listens on.
  httpPort: 3100

  # NDJSON fields to extract from log lines via pipeline stages.
  # These match the fields produced by @ai-di/shared-logging.
  ndjsonFields:
    - timestamp
    - level
    - service
    - requestId
    - userId
    - sessionId
    - clientIp
    - method
    - path
    - statusCode
    - durationMs

prometheus:
  image:
    repository: prom/prometheus
    tag: "v3.2.1"
    pullPolicy: IfNotPresent

  # Data retention period in days.
  retentionDays: 15

  # PVC size for Prometheus TSDB storage.
  pvcSize: 10Gi

  # Storage class for the PVC. Empty string uses the cluster default.
  storageClassName: ""

  # Scrape interval for all targets.
  scrapeInterval: "15s"

  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  # Port Prometheus listens on.
  httpPort: 9090

  # Scrape targets reference service names within the same namespace.
  scrapeTargets:
    backendServices:
      host: "backend-services"
      port: 3002
    temporalWorker:
      host: "temporal"
      port: 9091

grafana:
  image:
    repository: grafana/grafana
    tag: "11.5.2"
    pullPolicy: IfNotPresent

  # Admin credentials. Override GRAFANA_ADMIN_PASSWORD via --set or environment values.
  adminUser: admin
  adminPassword: "admin"

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "256Mi"
      cpu: "250m"

  # Port Grafana listens on.
  httpPort: 3001

  # PVC size for Grafana SQLite database and alert history.
  pvcSize: 1Gi

  # Storage class for the PVC. Empty string uses the cluster default.
  storageClassName: ""

alertmanager:
  image:
    repository: prom/alertmanager
    tag: "v0.28.1"
    pullPolicy: IfNotPresent

  # PVC size for Alertmanager silence/notification state storage.
  pvcSize: 2Gi

  # Storage class for the PVC. Empty string uses the cluster default.
  storageClassName: ""

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "128Mi"
      cpu: "100m"

  # Port Alertmanager listens on.
  httpPort: 9093

  # How long to wait before declaring an alert resolved.
  resolveTimeout: "5m"

  # Whether to route alerts to an external notification channel.
  # Set to true only after the chosen channel is verified end-to-end.
  notificationsEnabled: false

  # Active notification channel. Must be one of: ches, teams.
  notificationChannel: ches

  # Minimum severity level to route externally: warning (warning + critical) or critical (only critical).
  minNotificationSeverity: warning

  # Alert routing grouping/timing configuration.
  route:
    groupBy:
      - alertname
      - job
    groupWait: "10s"
    groupInterval: "1m"
    repeatInterval: "1h"

  # Teams receiver stub (disabled by default — org policy blocks external webhooks).
  teams:
    # Webhook URL for the Teams channel connector. Leave empty until org policy allows it.
    webhookUrl: ""

  # CHES (BCGov Common Hosted Email Service) — delivered via the ches-adapter service.
  # The ches-adapter (apps/ches-adapter) is deployed alongside Alertmanager when
  # notificationChannel == "ches". It accepts webhook payloads, authenticates
  # with CHES using OAuth2 client_credentials, and sends emails via CHES /api/v1/email.
  ches:
    # Internal ClusterIP URL of the ches-adapter service.
    # With the default Helm release name this resolves to:
    #   http://<release>-ches-adapter:<port>
    # Override with --set alertmanager.ches.adapterUrl=http://... when deploying.
    adapterUrl: ""
    # Shared secret that Alertmanager sends as 'Authorization: Bearer <secret>'.
    # Must match webhookSecret in the chesAdapter secret (see chesAdapter.secretName).
    webhookSecret: ""

# ches-adapter: CHES email adapter service.
# Deployed only when alertmanager.notificationChannel == "ches".
# All CHES credentials are read from a single Kubernetes Secret (secretName).
chesAdapter:
  image:
    repository: ""
    tag: "latest"
    pullPolicy: IfNotPresent
  # Port the service listens on (must match PORT env var passed to the container).
  port: 3003
  # Name of the Kubernetes Secret containing all sensitive values.
  # The Secret must have keys: webhookSecret, chesClientId, chesClientSecret,
  # chesAuthHost, chesHost, chesFromEmail, chesToEmails.
  # Create it before deploying, e.g.:
  #   oc create secret generic <name> \
  #     --from-literal=webhookSecret=<value> \
  #     --from-literal=chesClientId=<value> \
  #     ... etc.
  secretName: "ches-adapter-secrets"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
