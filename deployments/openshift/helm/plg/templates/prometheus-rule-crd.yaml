apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "plg.fullname" . }}-infra-alerts
  labels:
    {{- include "plg.labels" . | nindent 4 }}
    # Required by OpenShift User Workload Monitoring to pick up this rule.
    role: alert-rules
spec:
  groups:
    - name: infrastructure_alerts
      rules:
        - alert: HighPodCpuUsage
          expr: >-
            (
              sum(rate(container_cpu_usage_seconds_total{namespace="{{ .Release.Namespace }}", container!=""}[5m])) by (pod)
              /
              sum(kube_pod_container_resource_limits{namespace="{{ .Release.Namespace }}", resource="cpu"}) by (pod)
            ) > 0.8
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: High CPU usage detected on a pod
            description: A pod in namespace {{ .Release.Namespace }} is using more than 80% of its CPU limit. Check the pod labels in this alert for the affected pod name.

        - alert: HighPodMemoryUsage
          expr: >-
            (
              sum(container_memory_working_set_bytes{namespace="{{ .Release.Namespace }}", container!=""}) by (pod)
              /
              sum(kube_pod_container_resource_limits{namespace="{{ .Release.Namespace }}", resource="memory"}) by (pod)
            ) > 0.9
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: High memory usage detected on a pod
            description: A pod in namespace {{ .Release.Namespace }} is using more than 90% of its memory limit. Check the pod labels in this alert for the affected pod name.

        - alert: PodInErrorState
          expr: >-
            kube_pod_container_status_waiting_reason{namespace="{{ .Release.Namespace }}", reason="CrashLoopBackOff"} > 0
            or
            kube_pod_container_status_last_terminated_reason{namespace="{{ .Release.Namespace }}", reason="OOMKilled"} > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: Pod is in a crash or OOM error state
            description: A pod in namespace {{ .Release.Namespace }} is in CrashLoopBackOff or was OOMKilled. Check the pod labels in this alert for the affected pod name.

        - alert: PvcCapacityHigh
          expr: >-
            (
              kubelet_volume_stats_used_bytes{namespace="{{ .Release.Namespace }}"}
              /
              kubelet_volume_stats_capacity_bytes{namespace="{{ .Release.Namespace }}"}
            ) > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: PVC is nearing capacity
            description: >-
              A PersistentVolumeClaim in namespace {{ .Release.Namespace }} is using more than
              85% of its capacity. Check the persistentvolumeclaim label in this alert for the
              affected PVC name.

        - alert: PvcCapacityCritical
          expr: >-
            (
              kubelet_volume_stats_used_bytes{namespace="{{ .Release.Namespace }}"}
              /
              kubelet_volume_stats_capacity_bytes{namespace="{{ .Release.Namespace }}"}
            ) > 0.95
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: PVC is critically full
            description: >-
              A PersistentVolumeClaim in namespace {{ .Release.Namespace }} is using more than
              95% of its capacity and may cause service failures imminently. Check the
              persistentvolumeclaim label in this alert for the affected PVC name.

        - alert: TemporalTaskQueueDepthHigh
          expr: >-
            temporal_task_queue_depth > 1000
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Temporal task queue depth is high"
            description: "The Temporal task queue depth has exceeded 1000 tasks for 2 minutes, indicating a worker backlog."
