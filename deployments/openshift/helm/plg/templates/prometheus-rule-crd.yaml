apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "plg.fullname" . }}-infra-alerts
  labels:
    {{- include "plg.labels" . | nindent 4 }}
    # Required by OpenShift User Workload Monitoring to pick up this rule.
    role: alert-rules
spec:
  groups:
    - name: infrastructure_alerts
      rules:
        - alert: HighPodCpuUsage
          expr: >-
            (
              sum(rate(container_cpu_usage_seconds_total{namespace="{{ .Release.Namespace }}", container!=""}[5m])) by (pod)
              /
              sum(kube_pod_container_resource_limits{namespace="{{ .Release.Namespace }}", resource="cpu"}) by (pod)
            ) > 0.8
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage on pod {{ $labels.pod }}"
            description: "Pod {{ $labels.pod }} in namespace {{ .Release.Namespace }} is using more than 80% of its CPU limit."

        - alert: HighPodMemoryUsage
          expr: >-
            (
              sum(container_memory_working_set_bytes{namespace="{{ .Release.Namespace }}", container!=""}) by (pod)
              /
              sum(kube_pod_container_resource_limits{namespace="{{ .Release.Namespace }}", resource="memory"}) by (pod)
            ) > 0.9
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "High memory usage on pod {{ $labels.pod }}"
            description: "Pod {{ $labels.pod }} in namespace {{ .Release.Namespace }} is using more than 90% of its memory limit."

        - alert: PodInErrorState
          expr: >-
            kube_pod_container_status_waiting_reason{namespace="{{ .Release.Namespace }}", reason="CrashLoopBackOff"} > 0
            or
            kube_pod_container_status_last_terminated_reason{namespace="{{ .Release.Namespace }}", reason="OOMKilled"} > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is in an error state"
            description: "Pod {{ $labels.pod }} in namespace {{ .Release.Namespace }} is in CrashLoopBackOff or was OOMKilled."

        - alert: TemporalTaskQueueDepthHigh
          expr: >-
            temporal_task_queue_depth > 1000
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Temporal task queue depth is high"
            description: "The Temporal task queue depth has exceeded 1000 tasks for 2 minutes, indicating a worker backlog."
