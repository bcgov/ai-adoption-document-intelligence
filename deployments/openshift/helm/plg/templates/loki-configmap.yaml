apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "plg.loki.fullname" . }}-config
  labels:
    {{- include "plg.loki.labels" . | nindent 4 }}
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: {{ .Values.loki.httpPort }}

    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      retention_period: {{ include "plg.loki.retentionPeriod" . }}
      allow_structured_metadata: true
      ingestion_rate_mb: 4
      ingestion_burst_size_mb: 8

    ingester:
      # Flush idle log streams to disk after 5m instead of 30m to cap the
      # ingester's in-memory chunk footprint (mitigates Loki high-memory alerts).
      chunk_idle_period: 5m
      chunk_target_size: 1536000

    compactor:
      working_directory: /loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150
      delete_request_store: filesystem

    analytics:
      reporting_enabled: false
