apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "plg.grafana.fullname" . }}
  labels:
    {{- include "plg.grafana.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "plg.grafana.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "plg.grafana.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/grafana-configmap.yaml") . | sha256sum }}
        checksum/datasources: {{ include (print $.Template.BasePath "/grafana-datasources-configmap.yaml") . | sha256sum }}
        checksum/dashboards: {{ include (print $.Template.BasePath "/grafana-dashboards-configmap.yaml") . | sha256sum }}
        checksum/dashboard-provisioner: {{ include (print $.Template.BasePath "/grafana-dashboard-provisioner-configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.grafana.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.grafana.httpPort }}
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.grafana.adminPassword | quote }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/grafana/grafana.ini
              subPath: grafana.ini
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provisioner
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
      volumes:
        - name: config
          configMap:
            name: {{ include "plg.grafana.fullname" . }}-config
        - name: datasources
          configMap:
            name: {{ include "plg.grafana.fullname" . }}-datasources
        - name: dashboard-provisioner
          configMap:
            name: {{ include "plg.grafana.fullname" . }}-dashboard-provisioner
        - name: dashboards
          configMap:
            name: {{ include "plg.grafana.fullname" . }}-dashboards
