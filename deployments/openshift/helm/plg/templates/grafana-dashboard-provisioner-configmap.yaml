apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "plg.grafana.fullname" . }}-dashboard-provisioner
  labels:
    {{- include "plg.grafana.labels" . | nindent 4 }}
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: true
        editable: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
