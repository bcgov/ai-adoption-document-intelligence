apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "plg.grafana.fullname" . }}-dashboards
  labels:
    {{- include "plg.grafana.labels" . | nindent 4 }}
data:
  application-overview.json: |-
    {{- .Files.Get "dashboards/application-overview.json" | nindent 4 }}
  logs-explorer.json: |-
    {{- .Files.Get "dashboards/logs-explorer.json" | nindent 4 }}
  nodejs-runtime.json: |-
    {{- .Files.Get "dashboards/nodejs-runtime.json" | nindent 4 }}
