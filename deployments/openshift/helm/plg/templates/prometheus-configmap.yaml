apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "plg.prometheus.fullname" . }}-config
  labels:
    {{- include "plg.prometheus.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.prometheus.scrapeInterval }}

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - "{{ include "plg.alertmanager.fullname" . }}:{{ .Values.alertmanager.httpPort }}"

    rule_files:
      - "rules/*.yml"

    scrape_configs:
      - job_name: "backend-services"
        metrics_path: "/metrics"
        scrape_interval: {{ .Values.prometheus.scrapeInterval }}
        # Use Kubernetes pod service discovery to scrape each pod directly.
        # This ensures correct counter aggregation when multiple replicas are running.
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          # Keep only pods with app=backend-services label
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: backend-services
            action: keep
          # Set pod label to pod name for series identification
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # Set instance label to pod IP:port
          - source_labels: [__meta_kubernetes_pod_ip]
            regex: (.*)
            target_label: __address__
            replacement: $1:{{ .Values.prometheus.scrapeTargets.backendServices.port }}

      - job_name: "temporal-worker"
        metrics_path: "/metrics"
        scrape_interval: {{ .Values.prometheus.scrapeInterval }}
        # Use Kubernetes pod service discovery to scrape each pod directly.
        # This ensures correct counter aggregation when multiple replicas are running.
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          # Keep only pods with app=temporal-worker label
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: temporal-worker
            action: keep
          # Set pod label to pod name for series identification
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # Set instance label to pod IP:port
          - source_labels: [__meta_kubernetes_pod_ip]
            regex: (.*)
            target_label: __address__
            replacement: $1:{{ .Values.prometheus.scrapeTargets.temporalWorker.port }}
