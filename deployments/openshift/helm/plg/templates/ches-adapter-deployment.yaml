{{- if eq .Values.alertmanager.notificationChannel "ches" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "plg.chesAdapter.fullname" . }}
  labels:
    {{- include "plg.chesAdapter.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "plg.chesAdapter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "plg.chesAdapter.labels" . | nindent 8 }}
    spec:
      containers:
        - name: ches-adapter
          image: "{{ .Values.chesAdapter.image.repository }}:{{ .Values.chesAdapter.image.tag }}"
          imagePullPolicy: {{ .Values.chesAdapter.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args: ["node dist/index.js 2>&1 | tee -a /var/log/app/ches-adapter.log"]
          ports:
            - name: http
              containerPort: {{ .Values.chesAdapter.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.chesAdapter.port | quote }}
            - name: CHES_ADAPTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.chesAdapter.secretName }}
                  key: chesAdapterSecret
            - name: CHES_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.chesAdapter.secretName }}
                  key: chesClientId
            - name: CHES_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.chesAdapter.secretName }}
                  key: chesClientSecret
            - name: CHES_AUTH_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.chesAdapter.secretName }}
                  key: chesAuthHost
            - name: CHES_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.chesAdapter.secretName }}
                  key: chesHost
            - name: CHES_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.chesAdapter.secretName }}
                  key: chesFromEmail
            - name: CHES_TO_EMAILS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.chesAdapter.secretName }}
                  key: chesToEmails
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.chesAdapter.resources | nindent 12 }}
          volumeMounts:
            - name: logs
              mountPath: /var/log/app
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
      securityContext:
        runAsNonRoot: true
      containers:
        - name: logrotate
          image: {{ .Values.chesAdapter.sidecars.logrotate.image }}
          command: ["sh", "-c"]
          args:
            - |
              while true; do
                logrotate /etc/logrotate.conf
                sleep 3600
              done
          volumeMounts:
            - name: logs
              mountPath: /var/log/app
            - name: logrotate-config
              mountPath: /etc/logrotate.d
              readOnly: true
            - name: logrotate-state
              mountPath: /var/lib/logrotate
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
        - name: promtail
          image: {{ .Values.chesAdapter.sidecars.promtail.image }}
          args:
            - -config.file=/etc/promtail/promtail.yaml
          volumeMounts:
            - name: logs
              mountPath: /var/log/app
              readOnly: true
            - name: promtail-config
              mountPath: /etc/promtail
              readOnly: true
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: logs
          emptyDir: {}
        - name: logrotate-config
          configMap:
            name: {{ include "plg.chesAdapter.fullname" . }}-logrotate
        - name: logrotate-state
          emptyDir: {}
        - name: promtail-config
          configMap:
            name: {{ include "plg.chesAdapter.fullname" . }}-promtail
{{- end }}
