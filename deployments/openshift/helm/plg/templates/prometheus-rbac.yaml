apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "plg.prometheus.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "plg.prometheus.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "plg.prometheus.fullname" . }}
  labels:
    {{- include "plg.prometheus.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "plg.prometheus.fullname" . }}
  labels:
    {{- include "plg.prometheus.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "plg.prometheus.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "plg.prometheus.fullname" . }}
    namespace: {{ .Release.Namespace }}
