# PLG Stack - Local Docker Environment Overrides

loki:
  # Smaller storage for local development.
  pvcSize: 2Gi

  # Shorter retention for local development.
  retentionDays: 7

  resources:
    requests:
      memory: "128Mi"
      cpu: "250m"
    limits:
      memory: "256Mi"
      cpu: "500m"

prometheus:
  # Smaller storage for local development.
  pvcSize: 2Gi

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

grafana:
  resources:
    requests:
      memory: "128Mi"
      cpu: "125m"
    limits:
      memory: "256Mi"
      cpu: "250m"
